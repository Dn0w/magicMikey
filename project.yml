name: magicMice
options:
  bundleIdPrefix: com.magicmice
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.2"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTS_MAC_DESIGNED_FOR_IPAD: NO

schemes:
  magicMice:
    build:
      targets:
        magicMice: all
        magicMiceKeyboard: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  magicMice:
    type: application
    platform: iOS
    sources:
      - path: magicMice
    dependencies:
      - target: magicMiceKeyboard
        embed: true
    info:
      path: magicMice/Resources/Info.plist
      properties:
        CFBundleDisplayName: magicMice
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - ipad
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.Dn0w.magicMice
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: MU335F3K6A

  magicMiceKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: magicMice/UI/Keyboard
      - path: magicMice/UI/MacroBar
      - path: magicMice/Models
      - path: magicMice/UI/Settings
      - path: magicMice/Core/InputEngine/ModifierState.swift
      - path: magicMice/Core/InputEngine/HapticEngine.swift
      - path: magicMice/Core/InputEngine/InputRouter.swift
      - path: magicMice/Core/MacroStore.swift
      - path: magicMice/Resources/Assets.xcassets
      - path: KeyboardExtension
    info:
      path: KeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: magicMice Keyboard
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.Dn0w.magicMice.keyboard
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: MU335F3K6A

  magicMiceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: magicMiceTests
    dependencies:
      - target: magicMice
